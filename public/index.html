<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Sistema de Riego</title>
  <link rel="stylesheet" href="style.css">

  <!-- Librerías para gauges modernos -->
  <script src="https://cdn.jsdelivr.net/npm/raphael@2.3.0/raphael.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/justgage@1.3.5/justgage.min.js"></script>
</head>

<body>
  <header>
    <h1>🔧 Sistema de Riego</h1>
    <p id="status">Conectando...</p>
  </header>

  <!-- GAUGES HORIZONTALES -->
  <section class="gauges">
    <div id="gauge_suelo" class="gauge"></div>
    <div id="gauge_agua" class="gauge"></div>
    <div id="gauge_temp" class="gauge"></div>
    <div id="gauge_hum" class="gauge"></div>
  </section>

  <!-- TABLA -->
  <section>
    <h2>Últimos 10 registros</h2>
    <table>
      <thead>
        <tr>
          <th>Suelo</th>
          <th>Agua</th>
          <th>Temp</th>
          <th>Hum</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </section>

  <script>
    let gSuelo, gAgua, gTemp, gHum;

    function initGauges() {
      gSuelo = new JustGage({
        id: "gauge_suelo",
        value: 0,
        min: 0,
        max: 100,
        title: "Humedad Suelo",
        label: "%",
        levelColors: ["#ff4d4d","#f9c802","#00ff88"],
        gaugeWidthScale: 0.6,
        donut: true,
        counter: true,
        hideInnerShadow: true
      });

      gAgua = new JustGage({
        id: "gauge_agua",
        value: 0,
        min: 0,
        max: 100,
        title: "Nivel Agua",
        label: "%",
        levelColors: ["#ff4d4d","#f9c802","#00bfff"],
        gaugeWidthScale: 0.6,
        donut: true,
        counter: true,
        hideInnerShadow: true
      });

      gTemp = new JustGage({
        id: "gauge_temp",
        value: 0,
        min: 0,
        max: 60,
        title: "Temperatura",
        label: "°C",
        levelColors: ["#00bfff","#f9c802","#ff4d4d"],
        gaugeWidthScale: 0.6,
        donut: true,
        counter: true,
        hideInnerShadow: true
      });

      gHum = new JustGage({
        id: "gauge_hum",
        value: 0,
        min: 0,
        max: 100,
        title: "Humedad Aire",
        label: "%",
        levelColors: ["#ff4d4d","#f9c802","#00ff88"],
        gaugeWidthScale: 0.6,
        donut: true,
        counter: true,
        hideInnerShadow: true
      });
    }

    function actualizarGauges(suelo, agua, temp, hum) {
      gSuelo.refresh(suelo);
      gAgua.refresh(agua);
      gTemp.refresh(temp);
      gHum.refresh(hum);
    }

    // Inicializar gauges
    initGauges();

    // Actualizar datos cada 3 segundos
    setInterval(async () => {
      try {
        const res = await fetch("https://sistema-de-riego-w2uh.onrender.com/api/ultimos");
        const data = await res.json();
        if(data.length === 0) return;
        const u = data[0];

        // refrescar valores y mostrar % o °C
        actualizarGauges(u.suelo, u.agua, u.temp, u.hum);
      } catch(e) { console.error(e); }
    }, 3000);
  </script>

</body>
</html>
