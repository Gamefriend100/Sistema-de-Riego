<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Sistema de Riego</title>

  <!-- Librerías para gauges -->
  <script src="https://cdn.jsdelivr.net/npm/raphael@2.3.0/raphael.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/justgage@1.3.5/justgage.min.js"></script>

  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin:0; 
      padding:0; 
      background-color:#b2d8b2; /* verde naturaleza */
    }
    header { 
      text-align:center; 
      background:#2c3e50; 
      color:white; 
      padding:1rem; 
    }
    .gauges { 
      display:flex; 
      flex-wrap:wrap; 
      justify-content:center; 
      gap:1rem; 
      padding:1rem; 
    }
    .gauge-container { 
      flex:1 1 150px; 
      max-width:250px; 
      text-align:center; 
    }
    .gauge-container h3 { margin:0.5rem 0; }
    #alertas {
      width:95%;
      margin:0 auto 1rem auto;
      padding:0.5rem;
      background-color:#f5f5f5;
      border-radius:5px;
      text-align:center;
      font-weight:bold;
      min-height:1.5em;
    }
    table { 
      width:95%; 
      margin:1rem auto; 
      border-collapse:collapse; 
      font-size:0.9rem; 
    }
    th, td { padding:0.5rem; text-align:center; border:1px solid #ccc; }
    thead th { background-color:#006400; color:white; } /* verde fuerte */
    @media (max-width:600px) { 
      .gauges { flex-direction:column; align-items:center; } 
    }
  </style>
</head>
<body>
  <header>
    <h1>🔧 Sistema de Riego</h1>
    <p id="status"></p>
  </header>

  <section class="gauges">
    <div class="gauge-container">
      <h3>Humedad Suelo</h3>
      <div id="gauge_suelo"></div>
    </div>
    <div class="gauge-container">
      <h3>Nivel Agua</h3>
      <div id="gauge_agua"></div>
    </div>
    <div class="gauge-container">
      <h3>Temperatura</h3>
      <div id="gauge_temp"></div>
    </div>
    <div class="gauge-container">
      <h3>Humedad Aire</h3>
      <div id="gauge_hum"></div>
    </div>
  </section>

  <div id="alertas"></div>

  <section>
    <h2 style="text-align:center;">Últimos 10 registros</h2>
    <table>
      <thead>
        <tr>
          <th>Suelo</th>
          <th>Agua</th>
          <th>Temp</th>
          <th>Hum</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </section>

  <script>
    const API = "";

    let gSuelo, gAgua, gTemp, gHum;

    function initGauges() {
      gSuelo = new JustGage({
        id:"gauge_suelo", value:0, min:0, max:100, title:"", label:"%",
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true,
        levelColors:["#ff7f0e","#ffb84d"] // naranja
      });
      gAgua = new JustGage({
        id:"gauge_agua", value:0, min:0, max:100, title:"", label:"%",
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true,
        levelColors:["#00008B","#00BFFF"] // azul
      });
      gTemp = new JustGage({
        id:"gauge_temp", value:0, min:0, max:60, title:"", label:"°C",
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true,
        levelColors:["#CCCC00","#FFFF00"] // amarillo
      });
      gHum = new JustGage({
        id:"gauge_hum", value:0, min:0, max:100, title:"", label:"%",
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true,
        levelColors:["#0000CD","#87CEFA"] // azul aire
      });
    }

    function actualizarGauges(suelo, agua, temp, hum) {
      gSuelo.refresh(Number(suelo) || 0);
      gAgua.refresh(Number(agua) || 0);
      gTemp.refresh(Number(temp) || 0);
      gHum.refresh(Number(hum) || 0);

      // Lógica de alertas
      let mensaje = "";
      let color = "#228B22"; // verde por defecto
      if(suelo < 25 && agua < 25) {
        mensaje = "⚠️ Bajo nivel de agua y suelo seco";
        color = "#B22222"; // rojo
      } else if(suelo < 25) {
        mensaje = "⚠️ Humedad del suelo baja";
        color = "#FF8C00"; // naranja
      } else if(agua < 25) {
        mensaje = "⚠️ Nivel de agua bajo";
        color = "#FF8C00"; // naranja
      } else {
        mensaje = "✔️ Todo en rango";
        color = "#228B22"; // verde
      }
      const alertaDiv = document.getElementById("alertas");
      alertaDiv.textContent = mensaje;
      alertaDiv.style.color = color;
    }

    async function actualizar() {
      try {
        const res = await fetch(`${API}/api/ultimos`);
        const data = await res.json();
        if (!Array.isArray(data) || data.length===0) {
          document.getElementById("tabla").innerHTML=`<tr><td colspan="5" style="text-align:center;">No hay registros</td></tr>`;
          actualizarGauges(0,0,0,0);
          return;
        }
        const ultimo = data[0];
        actualizarGauges(ultimo.suelo,ultimo.agua,ultimo.temp,ultimo.hum);

        const html = data.map(r=>`
          <tr>
            <td>${r.suelo??0}%</td>
            <td>${r.agua??0}%</td>
            <td>${r.temp??0}°C</td>
            <td>${r.hum??0}%</td>
            <td>${new Date(r.fecha).toLocaleString()}</td>
          </tr>`).join("");
        document.getElementById("tabla").innerHTML=html;
      } catch(e) {
        console.error("Error al actualizar:", e);
        document.getElementById("tabla").innerHTML=`<tr><td colspan="5" style="text-align:center;color:red;">Error al conectar con la API</td></tr>`;
        actualizarGauges(0,0,0,0);
      }
    }

    initGauges();
    actualizar();
    setInterval(actualizar,3000);
  </script>
</body>
</html>
