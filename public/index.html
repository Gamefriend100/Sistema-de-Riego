<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Sistema de Riego</title>
  <link rel="stylesheet" href="style.css">

  <!-- Librerías para gauges -->
  <script src="https://cdn.jsdelivr.net/npm/raphael@2.3.0/raphael.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/justgage@1.3.5/justgage.min.js"></script>
</head>
<body>
  <header>
    <h1>🔧 Sistema de Riego</h1>
    <p id="status">Conectando...</p>
  </header>

  <section class="gauges">
    <div id="gauge_suelo" class="gauge"></div>
    <div id="gauge_agua" class="gauge"></div>
    <div id="gauge_temp" class="gauge"></div>
    <div id="gauge_hum" class="gauge"></div>
  </section>

  <section>
    <h2>Últimos 10 registros</h2>
    <table>
      <thead>
        <tr>
          <th>Suelo</th>
          <th>Agua</th>
          <th>Temp</th>
          <th>Hum</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </section>

  <script>
    const API = ""; // vacío porque el server sirve desde la misma URL

    let gSuelo, gAgua, gTemp, gHum;

    function initGauges() {
      gSuelo = new JustGage({
        id: "gauge_suelo", value:0, min:0, max:100, title:"Humedad Suelo",
        label:"%", levelColors:["#ff4d4d","#f9c802","#00ff88"],
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true
      });
      gAgua = new JustGage({
        id: "gauge_agua", value:0, min:0, max:100, title:"Nivel Agua",
        label:"%", levelColors:["#ff4d4d","#f9c802","#00bfff"],
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true
      });
      gTemp = new JustGage({
        id: "gauge_temp", value:0, min:0, max:60, title:"Temperatura",
        label:"°C", levelColors:["#00bfff","#f9c802","#ff4d4d"],
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true
      });
      gHum = new JustGage({
        id: "gauge_hum", value:0, min:0, max:100, title:"Humedad Aire",
        label:"%", levelColors:["#ff4d4d","#f9c802","#00ff88"],
        donut:true, counter:true, decimals:1, gaugeWidthScale:0.6, hideInnerShadow:true
      });
    }

    function actualizarGauges(suelo, agua, temp, hum) {
      gSuelo.refresh(Number(suelo) || 0);
      gAgua.refresh(Number(agua) || 0);
      gTemp.refresh(Number(temp) || 0);
      gHum.refresh(Number(hum) || 0);
    }

    async function actualizar() {
      try {
        const res = await fetch(`${API}/api/ultimos`);
        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          document.getElementById("tabla").innerHTML = `
            <tr><td colspan="5" style="text-align:center;">No hay registros</td></tr>`;
          actualizarGauges(0,0,0,0);
          return;
        }

        const ultimo = data[0];
        actualizarGauges(
          ultimo.suelo,
          ultimo.agua,
          ultimo.temp,
          ultimo.hum
        );

        const html = data.map(r => `
          <tr>
            <td>${r.suelo ?? 0}%</td>
            <td>${r.agua ?? 0}%</td>
            <td>${r.temp ?? 0}°C</td>
            <td>${r.hum ?? 0}%</td>
            <td>${new Date(r.fecha).toLocaleString()}</td>
          </tr>
        `).join("");

        document.getElementById("tabla").innerHTML = html;

      } catch(e) {
        console.error("Error al actualizar:", e);
        document.getElementById("tabla").innerHTML = `
          <tr><td colspan="5" style="text-align:center;color:red;">
          Error al conectar con la API
          </td></tr>`;
        actualizarGauges(0,0,0,0);
      }
    }

    initGauges();
    actualizar();
    setInterval(actualizar, 3000);
  </script>
</body>
</html>
